<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SS Arena - Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #070B14;
      --bg-secondary: #0D1526;
      --bg-glass: rgba(13, 21, 38, 0.85);
      --border-subtle: rgba(99, 179, 237, 0.12);
      --border-glow: rgba(99, 179, 237, 0.35);
      --accent-blue: #3B82F6;
      --accent-amber: #F59E0B;
      --text-primary: #F1F5F9;
      --text-secondary: #94A3B8;
      --neon-glow: 0 0 20px rgba(59, 130, 246, 0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-animation {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
      background: linear-gradient(135deg, #070B14 0%, #131D35 50%, #070B14 100%);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
    }
    @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .grid-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(99,179,237,0.03) 20px),
                        repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(99,179,237,0.03) 20px);
    }
    .login-card {
      position: relative; z-index: 10; width: 100%; max-width: 400px;
      background: var(--bg-glass); backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle); border-radius: 24px;
      padding: 40px 32px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .logo-section { text-align: center; margin-bottom: 32px; }
    .logo-icon { font-size: 40px; margin-bottom: 12px; display: inline-block; }
    .logo-text { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: 3px; color: var(--text-primary); }
    .logo-subtitle { font-size: 12px; color: var(--text-secondary); letter-spacing: 1px; margin-top: 4px; }
    .badge { display: inline-block; background: rgba(245,158,11,0.15); color: var(--accent-amber); font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; margin-top: 16px; }
    .separator { height: 1px; background: var(--border-subtle); margin: 24px 0; }
    .input-group { position: relative; margin-bottom: 20px; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none; }
    input {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-subtle);
      border-radius: 12px; padding: 14px 14px 14px 44px; color: var(--text-primary); font-size: 14px;
      transition: all 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
    .btn-login {
      width: 100%; background: var(--accent-blue); color: white; border: none; padding: 14px;
      border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer;
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: var(--neon-glow); }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }
    .error-msg { color: #EF4444; font-size: 13px; margin-top: 16px; text-align: center; min-height: 20px; }
    .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
  </style>
</head>
<body>
  <div class="bg-animation"></div>
  <div class="grid-overlay"></div>

  <div class="login-card" id="loginCard">
    <div class="logo-section">
      <div class="logo-icon">🛡️</div>
      <div class="logo-text">SS ARENA</div>
      <div class="logo-subtitle">PAYMENT MANAGER</div>
      <div class="badge">ADMIN ACCESS</div>
    </div>
    <div class="separator"></div>
    
    <form id="loginForm">
      <div class="input-group">
        <span class="input-icon">✉️</span>
        <input type="email" id="email" placeholder="Admin Email" required autocomplete="email">
      </div>
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btnLogin">Login</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  
  <script>
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'dashboard.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnLogin');
      const errorDiv = document.getElementById('errorMsg');
      const card = document.getElementById('loginCard');
      
      btn.disabled = true;
      btn.textContent = 'Authenticating...';
      errorDiv.textContent = '';

      try {
        await auth.signInWithEmailAndPassword(email, password);
      } catch (err) {
        errorDiv.textContent = err.message.replace('Firebase: ', '').replace(/\(auth.*\)/, '');
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 500);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
